version: 2

models:
  - name: int_claims
    description: |
      Incremental fact model at 1 row per `claim_id`.
    columns:
      - name: claim_id
        data_tests:
          - not_null
          - unique
      - name: fiscal_year_period
      - name: mrn
      - name: hospital_account_id
      - name: entity_id
      - name: service_date
      - name: posted_date
      - name: billed_amount
      - name: paid_amount
      - name: claim_status
      - name: _updated_at
